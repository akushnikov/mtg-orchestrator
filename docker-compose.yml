# =============================================================================
# MTG Orchestrator — Docker Compose baseline (Phase 1)
#
# Static services: nginx, backend, docker-socket-proxy, certbot, mtg-default.
#
# Networks:
#   proxy-net  (bridge)  — nginx, backend, mtg containers; nginx resolves
#                          container names via Docker embedded DNS (127.0.0.11)
#   socket-net (bridge, internal=true) — backend + docker-socket-proxy ONLY;
#                          no external routing; mtg containers must NOT join it
#
# Volumes:
#   nginx-config  — rendered nginx.conf written by backend (Jinja2); mounted
#                   into nginx as the active config
#   certs-volume  — Let's Encrypt certificates; certbot writes, backend reads
#   acme-webroot  — certbot HTTP-01 challenge files; nginx serves directly
#   mtg-default-data — mtg default instance runtime state
#   db-data       — SQLite registry (Phase 2+; declared here for volume parity)
#
# Logging: every service uses json-file driver with max-size/max-file to
# prevent disk exhaustion on the 30 GB Frankfurt NVMe (Pitfall 11).
#
# Security:
#   - /var/run/docker.sock mounted ONLY into docker-socket-proxy
#   - backend accesses Docker via DOCKER_HOST=tcp://docker-socket-proxy:2375
#   - docker-socket-proxy on socket-net (internal); never reachable from nginx
#     or mtg containers
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # nginx — SNI mux (stream ssl_preread) on :443 and :80
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    # Pinned container name so the backend can address it by a stable name for
    # the graceful-reload SIGHUP (docker_service.send_sighup("nginx")). Without
    # this, the container would be named <project>-nginx-1 and containers.get
    # ("nginx") would 404.
    container_name: nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    # The backend owns the active config: it renders nginx.conf into the shared
    # nginx-config volume (at /data/nginx) on startup and on every topology
    # change, then sends SIGHUP. nginx loads that file directly via -c. The
    # `include /etc/nginx/mime.types` inside the rendered config still resolves
    # from the image because we mount the volume at /data/nginx, not /etc/nginx.
    command: ["nginx", "-c", "/data/nginx/nginx.conf", "-g", "daemon off;"]
    volumes:
      # Shared rendered-config volume (backend writes, nginx reads). Read-only:
      # nginx never writes here.
      - nginx-config:/data/nginx:ro
      # Shared ACME webroot — nginx serves /.well-known/acme-challenge/
      # directly from this volume (certbot writes the challenge tokens here).
      - acme-webroot:/var/www/certbot:ro
    networks:
      - proxy-net
    depends_on:
      # Hard gate: the backend seeds /data/nginx/nginx.conf during its lifespan
      # startup, so nginx must not boot until the backend is healthy (and the
      # config file exists). mtg-default is a soft dependency (catch-all route).
      backend:
        condition: service_healthy
      mtg-default:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t", "-c", "/data/nginx/nginx.conf"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # backend — FastAPI + Uvicorn (Phase 1: placeholder; Phase 3: full app)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      # Docker SDK connects to socket-proxy over socket-net.
      DOCKER_HOST: ${DOCKER_HOST:-tcp://docker-socket-proxy:2375}
      # Panel domain for TLS cert path resolution and webhook URL (Phase 3+).
      PANEL_DOMAIN: ${PANEL_DOMAIN}
      # Moscow relay IP used in tg://proxy URLs.
      MOSCOW_IP: ${MOSCOW_IP}
      # Bot configuration (used Phase 3+; parsed by pydantic-settings).
      BOT_TOKEN: ${BOT_TOKEN}
      OWNER_USER_ID: ${OWNER_USER_ID}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    volumes:
      # Let's Encrypt certs — backend (uvicorn) terminates TLS for the panel.
      # Phase 1: volume exists but certs not yet issued; backend starts on HTTP.
      - certs-volume:/certs:ro
      # ACME webroot — shared volume. nginx serves /.well-known/acme-challenge/
      # directly from this volume on :80; the backend is NOT involved in ACME.
      # Mounted read-only here: the backend has no Phase 1 reason to write it
      # (Phase 2+ renewal hooks can switch to read-write when actually needed).
      - acme-webroot:/var/www/certbot:ro
      # SQLite registry (Phase 2+; backend will create db file on first start).
      - db-data:/data/db
      # Dynamic nginx config candidates and active nginx.conf (Phase 2+).
      - nginx-config:/data/nginx
      # Per-instance mtg TOML configs generated by backend (Phase 2+).
      - mtg-configs:/data/mtg-configs
    networks:
      - proxy-net
      - socket-net
    expose:
      # Internal only — nginx routes to these ports; not published to host.
      - "8080"   # plain HTTP (dev / ACME path)
      - "8443"   # TLS (prod, when certs are issued)
    healthcheck:
      # python:3.12-slim has no wget/curl — probe via python (stdlib urllib).
      # healthcheck.py tries :8443 (TLS) then :8080 (HTTP) so it works in either
      # mode the entrypoint chose. nginx depends_on this becoming healthy.
      test: ["CMD", "python", "/backend/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # docker-socket-proxy — restricts Docker API access for the backend
  # Joins socket-net ONLY. nginx and mtg containers have no route to it.
  # ---------------------------------------------------------------------------
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    restart: unless-stopped
    environment:
      # Allow only the endpoints the backend actually needs.
      # See STACK.md / PITFALLS.md Pitfall 7 for the reasoning.
      CONTAINERS: 1   # list, inspect, create, start, stop, remove containers
      NETWORKS: 1     # needed for attaching dynamic mtg containers to proxy-net
      POST: 1         # required for write operations (create/start/stop)
      # Everything else explicitly blocked (defaults to 0, listed for clarity):
      IMAGES: 0
      VOLUMES: 0
      EXEC: 0         # docker exec — NOT needed; nginx reload uses SIGHUP path
      BUILD: 0
      SWARM: 0
      SECRETS: 0
      AUTH: 0
      DISTRIBUTION: 0
      NODES: 0
      PLUGINS: 0
      SERVICES: 0
      SESSION: 0
      SYSTEM: 0
      TASKS: 0
    volumes:
      # The ONLY service that mounts the Docker socket.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-net   # internal=true; backend reaches it, nginx/mtg cannot
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # certbot — Let's Encrypt HTTP-01 certificate bootstrap and renewal
  #
  # This service is run on-demand (restart: "no").  Do NOT start it with
  # `docker compose up` — run it explicitly as a one-shot job:
  #
  #   Initial issuance (replace ${PANEL_DOMAIN} and ${LE_EMAIL} with .env values):
  #     docker compose run --rm certbot certonly \
  #       --webroot -w /var/www/certbot \
  #       -d ${PANEL_DOMAIN} \
  #       --email ${LE_EMAIL} \
  #       --agree-tos --no-eff-email ${CERTBOT_STAGING}
  #
  #   Renewal (run via cron/systemd timer on the VPS):
  #     docker compose run --rm certbot renew
  #
  # Volumes:
  #   certs-volume  → /etc/letsencrypt  (certbot writes issued certs here)
  #   acme-webroot  → /var/www/certbot  (certbot writes HTTP-01 challenge tokens;
  #                                      nginx serves them from the same volume)
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot
    restart: "no"
    environment:
      # Passed through from .env for use in manual certonly command (see above).
      # Set CERTBOT_STAGING=--staging in .env to test without hitting rate limits.
      CERTBOT_STAGING: ${CERTBOT_STAGING:-}
    volumes:
      # Let's Encrypt certificate storage — certbot writes certs; backend reads.
      - certs-volume:/etc/letsencrypt
      # ACME HTTP-01 webroot — certbot writes challenge files; nginx serves them.
      - acme-webroot:/var/www/certbot
    networks:
      - proxy-net
    # Default command: display help (safe no-op; never run certonly automatically).
    # Override at runtime: docker compose run --rm certbot certonly --webroot ...
    entrypoint: ["certbot"]
    command: ["--help"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # mtg-default — always-on default MTProto fake-TLS proxy (ria.ru masquerade)
  # This is the catch-all route for unknown/empty SNI on :443.
  # Clients without a matching domain entry in the nginx map reach this proxy.
  #
  # Phase 1: uses "simple-run" to accept the secret from MTG_DEFAULT_SECRET
  # env var (populated from .env). mtg v2 does NOT expand shell variables
  # inside TOML config files (scratch-based image, no shell interpolation),
  # so the secret must be passed as a positional CLI argument.
  #
  # Phase 2+: the backend generates per-instance config files with real
  # secrets; the compose command for those containers uses "run --config".
  #
  # "simple-run" signature: mtg simple-run <bind-to> <secret>
  # Prometheus metrics are not available via simple-run; use "run --config"
  # with infra/mtg/default.config.toml in Phase 2+ to enable stats.
  # ---------------------------------------------------------------------------
  mtg-default:
    image: nineseconds/mtg:2
    restart: unless-stopped
    # NOTE: mtg "simple-run" takes the secret as a POSITIONAL argument, so the
    # real secret (interpolated from .env at compose parse time) is visible in
    # `docker inspect`/`docker compose config`/process args. This is inherent
    # to simple-run. To avoid duplicating that exposure, the secret is passed
    # ONLY via the command line below — there is intentionally no redundant
    # `environment: MTG_DEFAULT_SECRET` block. Phase 2 migrates to
    # "run --config", where the secret lives only in a non-committed config
    # file with restricted permissions (single, minimized secret surface).
    #
    # Secret format (loaded from .env): ee + 32 hex chars (16 random bytes) +
    # hex(domain bytes). Example for ria.ru: ee<key32hex>7269612e7275
    #
    # The bind address must match the nginx upstream (mtg-default:3128).
    command: ["simple-run", "0.0.0.0:3128", "${MTG_DEFAULT_SECRET}"]
    networks:
      - proxy-net   # nginx reaches this container by name; no socket-net access
    expose:
      - "3128"   # MTProto proxy (nginx upstream)
    # NOTE: Do NOT publish these ports to the host — all traffic flows through
    # nginx SNI mux. Publishing would bypass the SNI mux and expose raw
    # MTProto directly (Anti-Pattern 2 from ARCHITECTURE.md research).
    #
    # Prometheus metrics (port 3129) are NOT exposed in Phase 1 (simple-run
    # does not support --stats flags). Phase 2 switches to "run --config" with
    # infra/mtg/default.config.toml to enable metrics.
    healthcheck:
      # mtg:2 is a scratch image (no shell, no wget/curl). Disable the
      # healthcheck for Phase 1; Phase 2 switches to "run --config" which
      # enables the Prometheus endpoint for a proper HTTP health probe.
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  nginx-config:
    # Rendered nginx.conf written by the backend (at /data/nginx) and read by
    # the nginx container (also at /data/nginx, loaded via `nginx -c`). Pinned
    # to a fixed name (no compose project prefix) so the backend's Docker-SDK
    # validation container can mount it by the literal name "nginx-config".
    name: nginx-config
  certs-volume:
    # Let's Encrypt certificates written by certbot, read by backend (uvicorn TLS).
  acme-webroot:
    # HTTP-01 challenge files written by certbot and served by nginx directly
    # at /.well-known/acme-challenge/ on :80. The backend is not involved.
  mtg-default-data:
    # mtg default instance runtime state (blocklist cache, replay cache, etc.).
  db-data:
    # SQLite registry for proxy instance records (Phase 2+).
  mtg-configs:
    # Per-instance mtg TOML configs: the backend writes them here and the
    # dynamically-created mtg containers mount this SAME volume read-only to
    # read their config. Pinned to a fixed name (no compose project prefix) so
    # the literal "mtg-configs" the backend passes to the Docker API resolves to
    # this volume, not an empty auto-created one.
    name: mtg-configs

# =============================================================================
# Networks
# =============================================================================
networks:
  proxy-net:
    # Standard bridge network shared by nginx, backend, and all mtg containers.
    # Docker embedded DNS (127.0.0.11) resolves container names here — required
    # for nginx ssl_preread map dynamic upstream resolution.
    driver: bridge

  socket-net:
    # Internal bridge — no external routing. Shared ONLY by backend and
    # docker-socket-proxy. nginx and mtg containers must NOT join this network
    # to prevent any path to the Docker socket proxy.
    driver: bridge
    internal: true
