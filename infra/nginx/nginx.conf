# =============================================================================
# nginx stream SNI mux — Phase 1 bootstrap configuration
#
# This file is the initial static config committed to the repo.
# In Phase 2+ the backend will re-render it from a Jinja2 template and write
# the result to the nginx-config volume, triggering a graceful reload.
#
# Architecture:
#   :443  ssl_preread  →  map by SNI:
#           exact PANEL_DOMAIN  → backend:8443  (real TLS terminated by uvicorn)
#           default             → mtg-default:3128  (fake-TLS passthrough)
#   :80                →  backend:8080  (ACME HTTP-01 challenge only)
# =============================================================================

stream {
    # Docker embedded DNS resolver — MANDATORY for dynamic container name resolution.
    # valid=10s ensures nginx re-queries after 10 s (not just at config load).
    # ipv6=off avoids AAAA lookup issues on some Docker bridge setups.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SNI-based routing map.
    # The map variable $proxy_upstream selects the backend to proxy_pass to.
    # Default (no SNI match, bare-IP connections, unknown domains) → default mtg.
    # This ensures scanners and empty-SNI probes reach fake-TLS, NOT the panel.
    map $ssl_preread_server_name $proxy_upstream {
        # Exact match for the panel subdomain → backend with real TLS.
        # Replace the literal below with ${PANEL_DOMAIN} when rendering via envsubst
        # or Jinja2 in Phase 2. For Phase 1 bootstrap it is a placeholder;
        # operator must set PANEL_DOMAIN in .env and re-render.
        "~^mtg\..+$"  backend:8443;

        # Default: route to the always-on default mtg instance (fake-TLS).
        default  mtg-default:3128;
    }

    # -------------------------------------------------------------------------
    # :443 — SNI mux entry point
    # -------------------------------------------------------------------------
    server {
        listen 443;
        ssl_preread on;

        proxy_pass $proxy_upstream;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;

        # Bound worker drain on graceful reload to prevent worker accumulation
        # under load (Pitfall 5 from research).
    }

    # -------------------------------------------------------------------------
    # :80 — ACME HTTP-01 challenge only
    # All HTTP traffic is forwarded to the backend webroot handler.
    # Backend serves /.well-known/acme-challenge/ from the shared ACME volume
    # and redirects everything else to HTTPS.
    # -------------------------------------------------------------------------
    server {
        listen 80;
        proxy_pass backend:8080;
        proxy_connect_timeout 5s;
        proxy_timeout 30s;
    }
}
