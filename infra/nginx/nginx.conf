# =============================================================================
# nginx — SNI mux + ACME challenge handler — Phase 1 bootstrap configuration
#
# Architecture:
#   :443  stream/ssl_preread  →  map by SNI:
#           exact ${PANEL_DOMAIN}  → backend:8443  (real TLS terminated by uvicorn)
#           default               → mtg-default:3128  (fake-TLS passthrough)
#   :80   http                →  nginx serves /.well-known/acme-challenge/ from
#                                the shared ACME webroot volume (certbot writes here)
#
# Phase 2+ note: the backend re-renders this file from a Jinja2 template and
# writes the result to the nginx-config volume, triggering a graceful reload.
# The envsubst placeholder ${PANEL_DOMAIN} in the stream map will be replaced
# with the operator's actual subdomain during that rendering step.
# =============================================================================

# ---------------------------------------------------------------------------
# events block — required when http context is present
# ---------------------------------------------------------------------------
events {
    worker_connections 1024;
}

# ---------------------------------------------------------------------------
# stream block — L4 SNI mux on :443
# ---------------------------------------------------------------------------
stream {
    # Docker embedded DNS resolver — MANDATORY for dynamic container name
    # resolution. valid=10s forces re-query every 10 s instead of just at
    # config-load time.  ipv6=off avoids AAAA lookup issues on some Docker
    # bridge setups (Pitfall 4 from PITFALLS.md).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SNI-based routing map.
    # Default (no SNI match, bare-IP connections, unknown domains) → default
    # mtg.  This ensures scanners and empty-SNI probes reach fake-TLS, NOT the
    # panel (Pitfall 3 from PITFALLS.md).
    map $ssl_preread_server_name $proxy_upstream {
        # Exact match for the panel subdomain → backend (real TLS).
        # ${PANEL_DOMAIN} is replaced by envsubst / Jinja2 rendering in Phase 2.
        # For Phase 1 the operator must edit this value or use envsubst to
        # substitute the actual subdomain before the first deploy.
        "${PANEL_DOMAIN}"  backend:8443;

        # Default: route to the always-on default mtg instance (fake-TLS).
        # Empty-string SNI also falls through to this default.
        default  mtg-default:3128;
    }

    # -------------------------------------------------------------------------
    # :443 — public entry point, L4 passthrough after SNI read
    # -------------------------------------------------------------------------
    server {
        listen 443;
        ssl_preread on;

        proxy_pass $proxy_upstream;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;

        # Bound worker drain on graceful reload to prevent worker accumulation
        # under load when TCP streams are long-lived (Pitfall 5).
    }
}

# ---------------------------------------------------------------------------
# http block — :80 for ACME HTTP-01 challenge files ONLY
#
# certbot (--webroot mode) writes challenge files to the acme-webroot volume.
# nginx serves those files so Let's Encrypt can validate domain ownership.
# All other HTTP traffic is redirected to HTTPS.
#
# NOTE: :80 is NOT a user-facing surface.  Panel users always use https on :443.
# ---------------------------------------------------------------------------
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name _;

        # Serve ACME HTTP-01 challenge tokens written by certbot.
        # certbot --webroot -w /var/www/certbot writes files here.
        # The acme-webroot Docker volume is shared between nginx and certbot.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            # Allow direct file serving; no index listing needed.
            try_files $uri =404;
        }

        # Redirect everything else to HTTPS.
        # This ensures a stray HTTP request to the panel domain still works
        # but does not expose anything over plain HTTP.
        location / {
            return 301 https://$host$request_uri;
        }
    }
}
